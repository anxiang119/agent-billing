name: "双Claude代码审查工作流"
description: "一个写代码，一个审核的自动化工作流"
version: "1.0.0"

# 定义工作流中的角色
actors:
  coder:
    name: "代码编写者"
    role: "根据需求编写代码"
    config: ".claude/rules/coder.yaml"
    session_name: "coder-workflow"
    
  reviewer:
    name: "代码审查者"
    role: "审查代码质量"
    config: ".claude/rules/reviewer.yaml"
    session_name: "reviewer-workflow"

# 定义全局变量
variables:
  project_root: "{{PROJECT_DIR}}"
  modules_dir: "{{project_root}}/modules"
  current_module: ""

# 工作流步骤定义
steps:
  # 步骤1: 初始化
  - name: "初始化工作流"
    type: "command"
    command: "echo '🚀 启动代码审查工作流'"
    
  # 步骤2: 读取任务
  - name: "读取任务分解"
    actor: "coder"
    type: "claude_session"
    config:
      instruction: |
        请读取以下文件，理解项目需求：
        1. spec.md - 需求规格
        2. plan.md - 实现计划  
        3. task.md - 任务分解
        
        完成后请确认理解，并列出需要开发的模块。
      files:
        - "spec.md"
        - "plan.md"
        - "task.md"
    output_to: "modules_list"
    
  # 步骤3: 提取模块列表
  - name: "解析模块"
    type: "script"
    script: |
      # 从task.md中提取模块
      modules=$(grep -E "^## Module|^### 模块" task.md | sed 's/^##* //' | tr ' ' '-')
      echo "$modules" > .claude/modules.txt
      echo "找到模块: $modules"
    output_to: "modules"
    
  # 步骤4: 循环处理每个模块
  - name: "处理所有模块"
    type: "foreach"
    items: "{{modules}}"
    item_var: "current_module"
    steps:
      # 子步骤4.1: 创建模块目录
      - name: "准备模块目录"
        type: "command"
        command: "mkdir -p modules/{{current_module}}"
        
      # 子步骤4.2: 编写代码
      - name: "编写模块代码"
        actor: "coder"
        type: "claude_session"
        config:
          instruction: |
            请开发模块: {{current_module}}
            
            要求：
            1. 根据 spec.md/plan.md/task.md 的要求
            2. 代码放在 modules/{{current_module}}/ 目录
            3. 确保代码质量
            4. 完成后在模块目录生成 README.md
            
            完成后请告诉我"模块代码编写完成"。
          working_dir: "modules/{{current_module}}"
        on_success:
          - type: "set_status"
            module: "{{current_module}}"
            status: "coding_completed"
        on_failure:
          - type: "notify"
            message: "模块 {{current_module}} 编写失败"
            
      # 子步骤4.3: 触发审核
      - name: "启动审核"
        type: "transition"
        condition: "{{current_module.status}} == 'coding_completed'"
        next: "审核代码"
        
      # 子步骤4.4: 审核代码
      - name: "审核代码"
        actor: "reviewer"
        type: "claude_session"
        config:
          instruction: |
            请审核以下模块的代码：
            模块: {{current_module}}
            目录: modules/{{current_module}}/
            
            审核要求：
            1. 检查代码质量
            2. 检查安全漏洞
            3. 检查性能问题
            4. 生成审核报告
            
            审核报告保存为：modules/{{current_module}}/review.md
            
            完成后请告诉我"审核完成"。
          files:
            - "modules/{{current_module}}/**/*"
        output_to: "review_result"
        on_success:
          - type: "set_status"
            module: "{{current_module}}"
            status: "review_completed"
            
      # 子步骤4.5: 检查审核结果
      - name: "检查审核结果"
        type: "condition"
        condition: "{{review_result.passed}} == true"
        if_true:
          - name: "标记通过"
            type: "set_status"
            module: "{{current_module}}"
            status: "approved"
        if_false:
          - name: "需要修复"
            type: "set_status"
            module: "{{current_module}}"
            status: "needs_fix"
            next: "修复代码"
            
      # 子步骤4.6: 修复代码（如果需要）
      - name: "修复代码"
        actor: "coder"
        type: "claude_session"
        condition: "{{current_module.status}} == 'needs_fix'"
        config:
          instruction: |
            请根据审核报告修复代码：
            模块: {{current_module}}
            审核报告: modules/{{current_module}}/review.md
            
            修复要求：
            1. 逐一解决审核报告中的问题
            2. 更新代码
            3. 验证修复
            
            修复完成后请告诉我"修复完成"。
        on_success:
          - type: "set_status"
            module: "{{current_module}}"
            status: "fixed"
          - type: "transition"
            next: "审核代码"  # 重新审核
        
      # 子步骤4.7: 完成模块
      - name: "完成模块"
        type: "command"
        condition: "{{current_module.status}} == 'approved'"
        command: "echo '✅ 模块 {{current_module}} 已完成'"
        on_success:
          - type: "notify"
            message: "模块 {{current_module}} 开发完成"
            
  # 步骤5: 集成测试
  - name: "运行集成测试"
    actor: "coder"
    type: "claude_session"
    config:
      instruction: |
        请运行所有模块的集成测试
        
        要求：
        1. 检查模块间接口
        2. 运行端到端测试
        3. 生成测试报告
        
        测试报告保存为：test-report.md
    condition: "{{all_modules_completed}} == true"
    
  # 步骤6: 生成最终报告
  - name: "生成项目报告"
    actors: ["coder", "reviewer"]
    type: "claude_session"
    config:
      instruction: |
        请生成项目最终报告
        
        包含：
        1. 各模块完成情况
        2. 代码质量统计
        3. 测试覆盖率
        4. 后续建议
        
        报告保存为：final-report.md
        
  # 步骤7: 清理工作
  - name: "清理临时文件"
    type: "command"
    command: "rm -f .claude/modules.txt .claude/status.json"
    
  # 步骤8: 工作流完成
  - name: "工作流完成"
    type: "notify"
    message: "🎉 代码审查工作流执行完成！"
    
# 错误处理
error_handling:
  max_retries: 3
  on_error:
    - type: "notify"
      message: "工作流执行失败: {{error_message}}"
    - type: "save_state"
      file: ".claude/workflow-state-error.json"
      
# 状态持久化
state_persistence:
  enabled: true
  file: ".claude/workflow-state.json"
  auto_save: true
  
# 监控和日志
monitoring:
  log_level: "info"
  log_file: ".claude/workflow.log"
  metrics:
    - "step_duration"
    - "success_rate"
    - "retry_count"