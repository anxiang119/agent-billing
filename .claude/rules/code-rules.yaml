# .claude/rules/coder-rules.yaml

name: "代码编写者规则"
description: "负责编写代码的实现者"

hooks:
  PostToolUse:
    - matcher: "Edit|Write"
      hooks:
        - type: "notification"
          message: "代码已修改"
        - type: "command"
          command: "echo '代码修改时间: $(date)' >> .claude/coder.log"

rules:
  - name: "代码规范"
    when: "file_created"
    pattern: "**/*.js|**/*.ts|**/*.py|**/*.java"
    action: "apply_coding_standards"
    
  - name: "模块结构"
    when: "directory_created"
    pattern: "modules/*"
    action: "create_module_structure"
    
settings:
  auto_format: true
  test_coverage: 80
  documentation_required: true