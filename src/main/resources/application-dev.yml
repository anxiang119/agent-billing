spring:
  application:
    name: agent-billing

  # 数据源配置 - 使用环境变量
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/agent_billing?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
      web-stat-filter:
        enabled: true
        url-pattern: /*
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        reset-enable: false

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: true

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  # RabbitMQ 配置
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10
        concurrency: 5
        max-concurrency: 10

  # Flyway 配置
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    encoding: UTF-8
    baseline-on-migrate: true
    validate-on-migrate: true
    url: ${DB_URL:jdbc:mysql://localhost:3306/agent_billing?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    user: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 缓存配置
  cache:
    type: redis
    redis:
      time-to-live: 3600000
      key-prefix: "billing:"
      cache-null-values: false

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  type-aliases-package: com.billing.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Redisson 配置
redisson:
  address: ${REDIS_URL:redis://localhost:6379}
  database: ${REDIS_DB:0}
  connectionPoolSize: 20
  connectionMinimumIdleSize: 5
  password: ${REDIS_PASSWORD:}

# 服务配置
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    max-threads: 200
    min-spare-threads: 20
    max-connections: 10000

# 管理端点配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

# 日志配置
logging:
  level:
    root: INFO
    com.billing: DEBUG
    com.alibaba.druid: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/agent-billing.log
    max-size: 100MB
    max-history: 30

# 自定义配置
billing:
  # 定价配置缓存时间（秒）
  pricing-config-cache-ttl: 300
  # 分布式锁超时时间（秒）
  distributed-lock-timeout: 30
  # 预扣费用比例
  pre-deduct-ratio: 1.0
  # 账单生成时间（每月1号凌晨2点）
  bill-generate-cron: "0 0 2 1 * ?"
  # 预算检查时间（每天上午9点）
  budget-check-cron: "0 0 9 * * ?"
  # 数据归档时间（每周日凌晨3点）
  data-archive-cron: "0 0 3 ? * SUN"
  # 支付网关配置
  payment:
    wechat:
      enabled: true
      app-id: ${WECHAT_APP_ID:}
      mch-id: ${WECHAT_MCH_ID:}
      api-key: ${WECHAT_API_KEY:}
      notify-url: ${WECHAT_NOTIFY_URL:}
    alipay:
      enabled: true
      app-id: ${ALIPAY_APP_ID:}
      private-key: ${ALIPAY_PRIVATE_KEY:}
      public-key: ${ALIPAY_PUBLIC_KEY:}
      notify-url: ${ALIPAY_NOTIFY_URL:}

# OpenAPI 文档配置
springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  info:
    title: 智能体计费系统API
    description: 智能体计费系统REST API文档
    version: 1.0.0
    contact:
      name: 技术支持
      email: support@example.com
